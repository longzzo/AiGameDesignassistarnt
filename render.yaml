# Render Blueprint — 백엔드(FastAPI)를 무료 웹 서비스로 배포.
# render.com 에서 "New > Blueprint"로 이 리포를 연결하면 자동 인식된다.
# (무료 플랜은 유휴 시 슬립 → 첫 요청에 ~50초 콜드스타트가 있을 수 있음)
services:
  - type: web
    name: gamegoal-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      # 대시보드에서 직접 입력(시크릿). GitHub Models PAT.
      - key: GITHUB_MODELS_TOKEN
        sync: false
      # 프론트(GitHub Pages) 주소를 CORS 허용에 추가. 예: https://<user>.github.io
      - key: ALLOWED_ORIGINS
        sync: false
      - key: LLM_REASONING_EFFORT
        value: low
